name: Sync upstream

on:
  schedule:
    - cron: "20 19 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    name: Sync MarSeventh/CloudFlare-ImgBed
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'nextwa/CloudFlare-ImgBed' }}

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Mirror upstream main and preserve this workflow
        id: sync
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/MarSeventh/CloudFlare-ImgBed.git
          git fetch upstream main

          current_origin="$(git rev-parse HEAD)"
          cp .github/workflows/sync-upstream.yml /tmp/sync-upstream.yml

          # Upstream occasionally rewrites main. Resetting to its tree avoids
          # recurring merge conflicts while retaining this repository's sync job.
          git reset --hard upstream/main
          mkdir -p .github/workflows
          cp /tmp/sync-upstream.yml .github/workflows/sync-upstream.yml
          git add -A

          if git diff --cached --quiet; then
            echo "Fork is already up to date with upstream/main."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: sync MarSeventh/CloudFlare-ImgBed@$(git rev-parse --short upstream/main)"
          git push --force-with-lease="refs/heads/main:${current_origin}" origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Worker deploy workflow when configured
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh workflow view deploy-worker.yml --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh workflow run deploy-worker.yml --repo "${{ github.repository }}" --ref main
          fi
